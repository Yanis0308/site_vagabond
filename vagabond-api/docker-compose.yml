version: '3.8'
services:
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: postgresql-postgis
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vagabond
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend

volumes:
  db-data:

networks:
  backend:
    driver: bridge
