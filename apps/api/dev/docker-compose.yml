# Local Postgres for API. Requires dev/.env (DOCKER_DB_API_PORT).
version: "3.8"
name: vagabond-api-${DOCKER_DB_API_PORT?}
services:
  db:
    container_name: postgresql-postgis-api-${DOCKER_DB_API_PORT?}
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vagabond
    volumes:
      - api-db-data:/var/lib/postgresql/data
    ports:
      - "${DOCKER_DB_API_PORT?}:5432"
    networks:
      - backend

volumes:
  api-db-data:
    name: api-db-data-${DOCKER_DB_API_PORT?}

networks:
  backend:
    driver: bridge
