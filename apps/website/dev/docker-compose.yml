# Local Postgres for Payload CMS. Requires dev/.env (DOCKER_DB_CMS_PORT).
version: "3.8"
name: vagabond-website-${DOCKER_DB_CMS_PORT?}
services:
  db:
    container_name: postgresql-website-${DOCKER_DB_CMS_PORT?}
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vagabond_website
    volumes:
      - website-db-data:/var/lib/postgresql/data
    ports:
      - "${DOCKER_DB_CMS_PORT?}:5432"
    networks:
      - backend

volumes:
  website-db-data:
    name: website-db-data-${DOCKER_DB_CMS_PORT?}

networks:
  backend:
    driver: bridge
