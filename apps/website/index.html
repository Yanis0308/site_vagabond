<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vagabond</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="favicon.png" />
    <meta name="theme-color" content="#f1512a" />
  </head>
  <body>
    <div class="container">
      <img
        src="logo_with_text.png"
        alt="Vagabond logo with text"
        class="logo"
      />
      <main>
        <div class="cta-buttons">
          <a href="https://linktr.ee/vagabond_app" class="btn"
            >Nous contacter</a
          >
        </div>

        <div class="divider-horizontal"></div>
        <div>
          <iframe
            data-tally-src="https://tally.so/embed/nPbXLd?alignLeft=1&transparentBackground=1&dynamicHeight=1"
            loading="lazy"
            width="100%"
            height="174"
            frameborder="0"
            marginheight="0"
            marginwidth="0"
            title="Inscription beta test Vagabond"
          ></iframe>
          <script>
            var d = document,
              w = "https://tally.so/widgets/embed.js",
              v = function () {
                "undefined" != typeof Tally
                  ? Tally.loadEmbeds()
                  : d
                      .querySelectorAll("iframe[data-tally-src]:not([src])")
                      .forEach(function (e) {
                        e.src = e.dataset.tallySrc;
                      });
              };
            if ("undefined" != typeof Tally) v();
            else if (d.querySelector('script[src="' + w + '"]') == null) {
              var s = d.createElement("script");
              (s.src = w),
                (s.onload = v),
                (s.onerror = v),
                d.body.appendChild(s);
            }
          </script>
        </div>
      </main>
    </div>
  </body>
</html>
