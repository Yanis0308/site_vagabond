name: vagabond-data-manager
services:
  db:
    container_name: postgresql-postgis-data-manager
    image: postgis/postgis:17-3.5-alpine
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vagabond-data-manager
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5442:5432"
    networks:
      - backend

  # nominatim:
  #   container_name: nominatim
  #   image: mediagis/nominatim:4.4
  #   ports:
  #     - "8182:8080"
