# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - uses: actions/checkout@v4

      - name: Cache Turborepo local cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      - run: pnpm run check-all
        env:
          TURBO_TELEMETRY_DISABLED: 1
          # Plafonne l'attente du worker synckit de `better-tailwindcss`
          # (cf. synckit#230). Le website, qui hang au-delà même de cette
          # limite, est en plus protégé par un retry (scripts/eslint-retry.mjs,
          # câblé dans son `lint-check`). Filet pour les autres apps frontend.
          SYNCKIT_TIMEOUT: 60000

      # Build prod du Dashboard : valide que `next build` passe (server components,
      # Suspense boundaries, etc.) — `check-all` ne fait que typecheck/lint/prettier.
      # Les `NEXT_PUBLIC_*` sont injectées en placeholders : `publicEnv` (Zod) valide
      # uniquement le format (URL / non-vide), le build ne fait aucun appel réseau.
      - name: Build dashboard
        run: pnpm turbo run build --filter=@vagabond/dashboard
        env:
          TURBO_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
          NEXT_PUBLIC_API_URL: http://localhost:3000
