# Déploiement du Dashboard (apps/dashboard) sur Vercel via GitHub Actions, en mode PREBUILT.
# 2 environnements (cf. docs/adr/0010-*) :
#   - Dev        : sur push main, aliasé sur une URL *.vercel.app stable (suit main)
#   - Production : déclenchement manuel uniquement (workflow_dispatch), build --prod
# Indépendant de ci-checks.yml (pas de gating). Voir docs/adr/0010-*.

name: Deploy Dashboard

on:
  push:
    branches: ["main"]
    paths:
      - "apps/dashboard/**"
      - "libs/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/deploy-dashboard.yml"
      - ".github/workflows/deploy-vercel.yml"
  workflow_dispatch:

# Permissions du GITHUB_TOKEN requises par le reusable. Le défaut du repo est restrictif
# (deployments à 'none') ; sans ce bloc explicite, un reusable ne peut pas élever ses permissions
# et l'appel échoue. Accordé au niveau caller car un reusable ne fait que restreindre.
permissions:
  contents: read
  deployments: write

# Sérialise les déploiements par type d'événement. Pour le Dev (push main), un nouveau push
# annule le déploiement précédent encore en cours → l'alias stable ne risque pas de finir
# pointé sur un commit plus ancien. La production (workflow_dispatch) n'est jamais annulée
# en cours de route (cancel-in-progress: false).
concurrency:
  group: deploy-dashboard-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  dev:
    if: github.event_name == 'push'
    uses: ./.github/workflows/deploy-vercel.yml
    with:
      environment-name: dev
      vercel-environment: preview
      # TODO: remplacer par l'alias *.vercel.app fixe réel du Dev Dashboard.
      alias-domains: dev-vagagond-dashboard.vercel.app
    secrets:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD }}

  production:
    # Restreint la prod à main : un workflow_dispatch lancé depuis une autre branche ne doit
    # pas pouvoir déployer du code non mergé en production (le reusable checkout le ref déclencheur).
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy-vercel.yml
    with:
      environment-name: production
      vercel-environment: production
      production: true
    secrets:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD }}
